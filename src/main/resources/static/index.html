<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokhylla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f4ede0;
            --ink: #2b2620;
            --ink-soft: #6b6254;
            --accent: #8a3324;       /* dyp rødbrun, som bokrygg */
            --accent-dark: #6e2519;
            --gold: #b08442;
            --line: #d8cdb8;
            --card: #fbf7ee;
            --read: #4a6c4f;         /* grønn */
            --reading: #c08a2d;      /* gyllen */
            --want: #4a6c8a;         /* blå */
            --wishlist: #8a4a6c;     /* lilla-rosa */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Spectral', Georgia, serif;
            background-color: var(--paper);
            background-image:
                    radial-gradient(circle at 20% 30%, rgba(176,132,66,0.06) 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(138,51,36,0.05) 0%, transparent 40%);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.6;
            padding: 0 0 60px;
        }

        header {
            text-align: center;
            padding: 50px 20px 30px;
            border-bottom: 2px solid var(--line);
            position: relative;
        }
        header::after {
            content: "";
            position: absolute;
            bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 2px;
            background: var(--accent);
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 900;
            font-size: clamp(2.4rem, 6vw, 4rem);
            letter-spacing: -0.02em;
            color: var(--ink);
        }
        .subtitle {
            font-style: italic;
            color: var(--ink-soft);
            font-size: 1.1rem;
            margin-top: 6px;
        }

        .wrap {
            max-width: 920px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ---- skjema ---- */
        .add-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 28px;
            margin-top: 40px;
            box-shadow: 0 10px 30px -18px rgba(43,38,32,0.5);
        }
        .add-card h2 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 18px;
            color: var(--accent);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field { display: flex; flex-direction: column; }
        .field.full { grid-column: 1 / -1; }
        label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
            margin-bottom: 6px;
            font-family: 'Spectral', serif;
        }
        input, select {
            font-family: 'Spectral', serif;
            font-size: 1rem;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 3px;
            background: #fffdf8;
            color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(138,51,36,0.12);
        }
        button {
            font-family: 'Fraunces', serif;
            cursor: pointer;
            border: none;
            transition: transform 0.12s, background 0.2s;
        }
        .btn-add {
            margin-top: 20px;
            background: var(--accent);
            color: #f8f1e4;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 3px;
            letter-spacing: 0.01em;
        }
        .btn-add:hover { background: var(--accent-dark); }
        .btn-add:active { transform: translateY(1px); }

        /* ---- filtre ---- */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 44px 0 20px;
            align-items: center;
        }
        .filters .flabel {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.3rem;
            margin-right: 8px;
        }
        .chip {
            font-family: 'Spectral', serif;
            background: transparent;
            border: 1px solid var(--line);
            color: var(--ink-soft);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); }
        .chip.active {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        /* ---- bokliste ---- */
        .book-list { display: flex; flex-direction: column; gap: 14px; }
        .book {
            display: flex;
            align-items: center;
            gap: 18px;
            background: var(--card);
            border: 1px solid var(--line);
            border-left: 5px solid var(--line);
            border-radius: 4px;
            padding: 18px 20px;
            animation: rise 0.4s ease both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .book-main { flex: 1; min-width: 0; }
        .book-title {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--ink);
        }
        .book-meta {
            color: var(--ink-soft);
            font-size: 0.95rem;
            font-style: italic;
        }
        .badge {
            font-family: 'Spectral', serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            padding: 4px 12px;
            border-radius: 20px;
            color: #fff;
            white-space: nowrap;
            font-weight: 500;
        }
        .badge.READ { background: var(--read); }
        .badge.READING { background: var(--reading); }
        .badge.WANT_TO_READ { background: var(--want); }
        .badge.WISHLIST { background: var(--wishlist); }
        .book[data-status="READ"] { border-left-color: var(--read); }
        .book[data-status="READING"] { border-left-color: var(--reading); }
        .book[data-status="WANT_TO_READ"] { border-left-color: var(--want); }
        .book[data-status="WISHLIST"] { border-left-color: var(--wishlist); }

        .btn-del {
            background: transparent;
            color: var(--ink-soft);
            border: 1px solid var(--line);
            width: 34px; height: 34px;
            border-radius: 50%;
            font-size: 1.1rem;
            line-height: 1;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }
        .btn-del:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--ink-soft);
            font-style: italic;
            font-size: 1.1rem;
        }

        .count {
            font-family: 'Spectral', serif;
            font-size: 0.9rem;
            color: var(--ink-soft);
            margin-left: auto;
        }

        .toast {
            position: fixed;
            bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%);
            background: var(--ink);
            color: var(--paper);
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: transform 0.3s ease;
            z-index: 50;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 560px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <h1>Bokhylla</h1>
    <p class="subtitle">Lest, leser, og alt jeg ennå drømmer om å lese</p>
</header>

<div class="wrap">
    <!-- Skjema for å legge til bok -->
    <div class="add-card">
        <h2>Legg til en bok</h2>
        <div class="form-grid">
            <div class="field full">
                <label for="title">Tittel</label>
                <input type="text" id="title" placeholder="f.eks. Sofies verden">
            </div>
            <div class="field">
                <label for="author">Forfatter</label>
                <input type="text" id="author" placeholder="f.eks. Jostein Gaarder">
            </div>
            <div class="field">
                <label for="pages">Antall sider</label>
                <input type="number" id="pages" placeholder="518" min="0">
            </div>
            <div class="field full">
                <label for="status">Status</label>
                <select id="status">
                    <option value="READ">Lest</option>
                    <option value="READING">Leser nå</option>
                    <option value="WANT_TO_READ">Vil lese</option>
                    <option value="WISHLIST">Ønskeliste</option>
                </select>
            </div>
        </div>
        <button class="btn-add" onclick="addBook()">Sett i hylla</button>
    </div>

    <!-- Filtre -->
    <div class="filters">
        <span class="flabel">Hyllen min</span>
        <button class="chip active" data-filter="ALL" onclick="setFilter('ALL', this)">Alle</button>
        <button class="chip" data-filter="READ" onclick="setFilter('READ', this)">Lest</button>
        <button class="chip" data-filter="READING" onclick="setFilter('READING', this)">Leser nå</button>
        <button class="chip" data-filter="WANT_TO_READ" onclick="setFilter('WANT_TO_READ', this)">Vil lese</button>
        <button class="chip" data-filter="WISHLIST" onclick="setFilter('WISHLIST', this)">Ønskeliste</button>
        <span class="count" id="count"></span>
    </div>

    <!-- Bokliste -->
    <div class="book-list" id="bookList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/books';
    let currentFilter = 'ALL';

    const STATUS_LABELS = {
        READ: 'Lest',
        READING: 'Leser nå',
        WANT_TO_READ: 'Vil lese',
        WISHLIST: 'Ønskeliste'
    };

    // Hent og vis bøker når siden lastes
    document.addEventListener('DOMContentLoaded', loadBooks);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Henter bøker fra API-et. Bruker /books/status/X hvis et filter er valgt.
    async function loadBooks() {
        try {
            const url = currentFilter === 'ALL' ? API : `${API}/status/${currentFilter}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Kunne ikke hente bøker');
            const books = await res.json();
            renderBooks(books);
        } catch (err) {
            showToast('Feil ved henting: ' + err.message);
        }
    }

    function renderBooks(books) {
        const list = document.getElementById('bookList');
        const count = document.getElementById('count');
        count.textContent = books.length === 1 ? '1 bok' : `${books.length} bøker`;

        if (books.length === 0) {
            list.innerHTML = '<div class="empty">Ingen bøker her ennå. Legg til din første over!</div>';
            return;
        }

        list.innerHTML = books.map(b => `
      <div class="book" data-status="${b.status}">
        <div class="book-main">
          <div class="book-title">${escapeHtml(b.title)}</div>
          <div class="book-meta">
            ${b.author ? escapeHtml(b.author) : 'Ukjent forfatter'}${b.pages ? ' &middot; ' + b.pages + ' sider' : ''}
          </div>
        </div>
        <span class="badge ${b.status}">${STATUS_LABELS[b.status] || b.status}</span>
        <button class="btn-del" onclick="deleteBook(${b.id})" title="Slett">&times;</button>
      </div>
    `).join('');
    }

    // Sender ny bok til API-et med POST
    async function addBook() {
        const title = document.getElementById('title').value.trim();
        const author = document.getElementById('author').value.trim();
        const pages = document.getElementById('pages').value;
        const status = document.getElementById('status').value;

        if (!title) {
            showToast('Tittel kan ikke være tom');
            return;
        }

        const book = {
            title: title,
            author: author || null,
            pages: pages ? parseInt(pages) : null,
            status: status
        };

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(book)
            });
            if (!res.ok) throw new Error('Kunne ikke lagre boka');

            // Tøm skjemaet
            document.getElementById('title').value = '';
            document.getElementById('author').value = '';
            document.getElementById('pages').value = '';
            showToast('Boka er satt i hylla!');
            loadBooks();
        } catch (err) {
            showToast('Feil: ' + err.message);
        }
    }

    // Sletter en bok med DELETE
    async function deleteBook(id) {
        try {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error('Kunne ikke slette');
            showToast('Boka er fjernet');
            loadBooks();
        } catch (err) {
            showToast('Feil: ' + err.message);
        }
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        loadBooks();
    }

    // Enkel beskyttelse mot at spesialtegn i titler ødelegger HTML-en
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Lar deg trykke Enter i tittelfeltet for å legge til
    document.getElementById('title').addEventListener('keydown', e => {
        if (e.key === 'Enter') addBook();
    });
</script>
</body>
</html>
